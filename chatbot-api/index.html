<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0e0e0e;
            --ink-soft: #3a3a3a;
            --ink-mute: #888;
            --surface: #f5f3ee;
            --surface-2: #eceae3;
            --surface-3: #e0ddd5;
            --accent: #1a472a;
            --accent-light: #2d6a42;
            --accent-glow: rgba(26,71,42,0.12);
            --gold: #c9a84c;
            --gold-light: #f0d080;
            --white: #ffffff;
            --danger: #c0392b;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;
        }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(26,71,42,0.06) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201,168,76,0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Grain texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* ── AUTH SCREEN ── */
        #auth-screen {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--surface-3);
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 2px 40px rgba(0,0,0,0.07), 0 0 0 1px rgba(255,255,255,0.8) inset;
        }

        .auth-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .brand-mark::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
        }

        .brand-mark svg { width: 20px; height: 20px; fill: var(--gold-light); position: relative; z-index: 1; }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.5px;
        }

        .brand-name span { color: var(--accent); }

        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 1.75rem;
            border-bottom: 2px solid var(--surface-2);
        }

        .auth-tab {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-mute);
            cursor: pointer;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            position: relative;
            transition: color 0.2s;
        }

        .auth-tab::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0; right: 0;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }

        .auth-tab.active { color: var(--accent); }
        .auth-tab.active::after { transform: scaleX(1); }

        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form.hidden { display: none; }

        .field-wrap { display: flex; flex-direction: column; gap: 6px; }

        .field-label {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-mute);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .auth-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--surface-3);
            border-radius: var(--radius-sm);
            font-family: 'Instrument Sans', sans-serif;
            font-size: 15px;
            color: var(--ink);
            background: var(--surface);
            transition: border-color 0.15s, background 0.15s;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--accent);
            background: var(--white);
        }

        .auth-input::placeholder { color: var(--ink-mute); opacity: 0.5; }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            letter-spacing: 0.3px;
            transition: background 0.15s, transform 0.1s;
            position: relative;
            overflow: hidden;
        }

        .auth-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
        }

        .auth-btn:hover { background: var(--accent-light); }
        .auth-btn:active { transform: scale(0.99); }

        .alert {
            font-size: 13px;
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            display: none;
        }

        .alert-error { color: var(--danger); background: #fdf0ee; border: 1px solid #f5c6c0; }
        .alert-success { color: var(--accent); background: #edf5f0; border: 1px solid #b8d9c4; }

        /* ── CHAT SCREEN ── */
        #chat-screen {
            display: none;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 780px;
            height: 90vh;
            max-height: 820px;
            background: var(--white);
            border-radius: var(--radius-xl);
            border: 1px solid var(--surface-3);
            box-shadow: 0 2px 40px rgba(0,0,0,0.07), 0 0 0 1px rgba(255,255,255,0.8) inset;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.35s ease;
        }

        #chat-screen.visible { display: flex; }

        /* ── SIDEBAR + MAIN layout ── */
        .chat-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            border-right: 1px solid var(--surface-2);
            display: flex;
            flex-direction: column;
            background: var(--surface);
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 14px 14px 10px;
            border-bottom: 1px solid var(--surface-2);
        }

        .sidebar-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-mute);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 8px 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
            letter-spacing: 0.2px;
        }

        .new-chat-btn:hover { background: var(--accent-light); }
        .new-chat-btn svg { width: 14px; height: 14px; fill: white; flex-shrink: 0; }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .conversations-list::-webkit-scrollbar { width: 3px; }
        .conversations-list::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

        .conv-item {
            padding: 9px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .conv-item:hover { background: var(--surface-2); }
        .conv-item.active { background: var(--accent-glow); border: 1px solid rgba(26,71,42,0.15); }

        .conv-item svg { width: 13px; height: 13px; fill: var(--ink-mute); flex-shrink: 0; }
        .conv-item.active svg { fill: var(--accent); }

        .conv-title {
            font-size: 13px;
            color: var(--ink-soft);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .conv-item.active .conv-title { color: var(--accent); font-weight: 500; }

        .conv-delete {
            width: 18px;
            height: 18px;
            background: none;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: background 0.15s;
            flex-shrink: 0;
        }

        .conv-item:hover .conv-delete { display: flex; }
        .conv-delete:hover { background: #fdf0ee; }
        .conv-delete svg { width: 11px; height: 11px; fill: var(--danger); }

        .sidebar-empty {
            padding: 20px 14px;
            font-size: 12px;
            color: var(--ink-mute);
            text-align: center;
            line-height: 1.5;
        }

        /* ── MAIN CHAT ── */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--surface-2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
        }

        .chat-header-left { display: flex; align-items: center; gap: 10px; }

        .header-brand-mark {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-brand-mark svg { width: 17px; height: 17px; fill: var(--gold-light); }

        .chat-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -0.3px;
        }

        .chat-subtitle { font-size: 11px; color: var(--ink-mute); margin-top: 1px; }

        .header-right { display: flex; align-items: center; gap: 10px; }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: var(--surface);
            border-radius: 20px;
            border: 1px solid var(--surface-3);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .status-text { font-size: 11px; color: var(--ink-mute); font-weight: 500; }

        .logout-btn {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: var(--ink-mute);
            background: var(--surface);
            border: 1px solid var(--surface-3);
            padding: 5px 11px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            transition: all 0.15s;
        }

        .logout-btn:hover { color: var(--ink); border-color: var(--surface-3); background: var(--surface-2); }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeUp 0.22s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        .msg-avatar.ai {
            background: var(--accent);
            color: var(--gold-light);
        }

        .msg-avatar.user-av {
            background: var(--surface-3);
            color: var(--ink-soft);
        }

        .msg-bubble {
            max-width: 68%;
            padding: 11px 15px;
            border-radius: var(--radius-md);
            font-size: 14.5px;
            line-height: 1.6;
            font-family: 'Instrument Sans', sans-serif;
        }

        .msg-bubble.ai {
            background: var(--surface);
            color: var(--ink);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--surface-2);
        }

        .msg-bubble.user {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 2rem;
            text-align: center;
        }

        .empty-mark {
            width: 52px;
            height: 52px;
            background: var(--surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--surface-3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
        }

        .empty-mark svg { width: 26px; height: 26px; fill: var(--ink-mute); opacity: 0.4; }
        .empty-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: var(--ink-soft); }
        .empty-sub { font-size: 13px; color: var(--ink-mute); }

        .chat-input-area {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--surface-2);
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--white);
        }

        #user-input {
            flex: 1;
            padding: 11px 15px;
            border: 1.5px solid var(--surface-3);
            border-radius: var(--radius-md);
            font-family: 'Instrument Sans', sans-serif;
            font-size: 14.5px;
            color: var(--ink);
            background: var(--surface);
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        #user-input:focus { border-color: var(--accent); background: var(--white); }
        #user-input::placeholder { color: var(--ink-mute); opacity: 0.5; }

        #send-btn {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.1s;
        }

        #send-btn:hover { background: var(--accent-light); }
        #send-btn:active { transform: scale(0.95); }
        #send-btn svg { width: 17px; height: 17px; fill: white; }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 15px;
            background: var(--surface);
            border-radius: var(--radius-md);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--surface-2);
            width: fit-content;
        }

        .typing-dot {
            width: 5px;
            height: 5px;
            background: var(--ink-mute);
            border-radius: 50%;
            animation: bounce 1.3s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(245,243,238,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: var(--radius-xl);
            backdrop-filter: blur(2px);
        }

        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 2.5px solid var(--surface-3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-mark">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                </div>
                <div class="brand-name">Chat<span>AI</span></div>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="showTab('login')">Login</button>
                <button class="auth-tab" onclick="showTab('signup')">Sign up</button>
            </div>

            <div class="auth-form" id="login-form">
                <div class="field-wrap">
                    <div class="field-label">Email</div>
                    <input class="auth-input" id="login-email" type="email" placeholder="you@example.com"/>
                </div>
                <div class="field-wrap">
                    <div class="field-label">Password</div>
                    <input class="auth-input" id="login-password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
                </div>
                <div id="auth-error" class="alert alert-error"></div>
                <button class="auth-btn" onclick="login()">Sign in</button>
            </div>

            <div class="auth-form hidden" id="signup-form">
                <div class="field-wrap">
                    <div class="field-label">Email</div>
                    <input class="auth-input" id="signup-email" type="email" placeholder="you@example.com"/>
                </div>
                <div class="field-wrap">
                    <div class="field-label">Password</div>
                    <input class="auth-input" id="signup-password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signup()"/>
                </div>
                <div id="auth-success" class="alert alert-success"></div>
                <div id="auth-error-signup" class="alert alert-error"></div>
                <button class="auth-btn" onclick="signup()">Create account</button>
            </div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="header-brand-mark">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                </div>
                <div>
                    <div class="chat-title">ChatAI</div>
                    <div class="chat-subtitle">Powered by Claude</div>
                </div>
            </div>
            <div class="header-right">
                <div class="status-pill">
                    <div class="status-dot"></div>
                    <span class="status-text">Online</span>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="chat-body">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-title">Conversations</div>
                    <button class="new-chat-btn" onclick="createNewConversation()">
                        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        New Chat
                    </button>
                </div>
                <div class="conversations-list" id="conversations-list">
                    <div class="sidebar-empty">No conversations yet</div>
                </div>
            </div>

            <!-- Main Chat -->
            <div class="chat-main">
                <div id="messages">
                    <div class="empty-state" id="empty-state">
                        <div class="empty-mark">
                            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                        </div>
                        <div class="empty-title">Start a conversation</div>
                        <div class="empty-sub">Ask me anything</div>
                    </div>
                </div>

                <div class="chat-input-area">
                    <input id="user-input" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()"/>
                    <button id="send-btn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://full-stack-ai-chatbot-api-production.up.railway.app"
        let conversationId = null
        let allConversations = []

        // ── TAB SWITCHING ──
        function showTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t, i) =>
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1))
            )
            document.getElementById('login-form').classList.toggle('hidden', tab !== 'login')
            document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup')
        }

        function showAlert(id, msg) {
            const el = document.getElementById(id)
            el.textContent = msg
            el.style.display = 'block'
        }

        function hideAlert(id) {
            document.getElementById(id).style.display = 'none'
        }

        // ── SCREEN SWITCHING ──
        function switchToChat() {
            document.getElementById('auth-screen').style.display = 'none'
            document.getElementById('chat-screen').classList.add('visible')
        }

        function switchToAuth() {
            document.getElementById('chat-screen').classList.remove('visible')
            document.getElementById('auth-screen').style.display = 'block'
        }

        function logout() {
            localStorage.removeItem('token')
            conversationId = null
            allConversations = []
            clearMessages()
            switchToAuth()
        }

        // ── ON LOAD ──
        window.onload = function () {
            const token = localStorage.getItem('token')
            if (token) {
                switchToChat()
                loadAllConversations()
            }
        }

        // ── AUTH ──
        async function signup() {
            hideAlert('auth-error-signup')
            const email = document.getElementById('signup-email').value
            const password = document.getElementById('signup-password').value
            const res = await fetch(`${API}/auth/signup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            if (res.ok) {
                showAlert('auth-success', 'Account created! Please sign in.')
                setTimeout(() => showTab('login'), 1500)
            } else {
                const data = await res.json()
                showAlert('auth-error-signup', data.detail || 'Signup failed')
            }
        }

        async function login() {
            hideAlert('auth-error')
            const email = document.getElementById('login-email').value
            const password = document.getElementById('login-password').value
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            })
            if (res.ok) {
                const data = await res.json()
                localStorage.setItem('token', data.access_token)
                switchToChat()
                loadAllConversations()
            } else {
                const data = await res.json()
                showAlert('auth-error', data.detail || 'Login failed')
            }
        }

        // ── CONVERSATIONS ──
        async function loadAllConversations() {
            const token = localStorage.getItem('token')
            const res = await fetch(`${API}/conversations/`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            if (!res.ok) return

            allConversations = await res.json()
            renderConversationsList()

            if (allConversations.length > 0) {
                // Load the most recent conversation
                const latest = allConversations[allConversations.length - 1]
                selectConversation(latest.id)
            }
        }

        function renderConversationsList() {
            const list = document.getElementById('conversations-list')
            if (allConversations.length === 0) {
                list.innerHTML = '<div class="sidebar-empty">No conversations yet</div>'
                return
            }

            list.innerHTML = ''
            // Show newest first
            ;[...allConversations].reverse().forEach(conv => {
                const item = document.createElement('div')
                item.className = `conv-item ${conv.id === conversationId ? 'active' : ''}`
                item.dataset.id = conv.id
                item.innerHTML = `
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    <span class="conv-title">${conv.title || 'Conversation'}</span>
                    <button class="conv-delete" onclick="deleteConversation(event, ${conv.id})" title="Delete">
                        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                `
                item.addEventListener('click', (e) => {
                    if (!e.target.closest('.conv-delete')) selectConversation(conv.id)
                })
                list.appendChild(item)
            })
        }

        async function selectConversation(id) {
            conversationId = id
            clearMessages()
            renderConversationsList()
            await loadMessages(id)
        }

        async function loadMessages(convId) {
            const token = localStorage.getItem('token')
            const res = await fetch(`${API}/conversations/${convId}/messages`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            if (!res.ok) return
            const messages = await res.json()
            messages.forEach(m => addMessage(m.role, m.content))
        }

        async function createNewConversation() {
            const token = localStorage.getItem('token')
            const res = await fetch(`${API}/conversations/`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ title: 'New Conversation' })
            })
            if (!res.ok) return
            const conv = await res.json()
            allConversations.push(conv)
            conversationId = conv.id
            clearMessages()
            renderConversationsList()
        }

        async function deleteConversation(e, id) {
            e.stopPropagation()
            const token = localStorage.getItem('token')
            const res = await fetch(`${API}/conversations/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            })
            if (!res.ok) return

            allConversations = allConversations.filter(c => c.id !== id)

            if (conversationId === id) {
                conversationId = null
                clearMessages()
                if (allConversations.length > 0) {
                    selectConversation(allConversations[allConversations.length - 1].id)
                }
            }
            renderConversationsList()
        }

        // ── MESSAGES ──
        function clearMessages() {
            document.getElementById('messages').innerHTML = `
                <div class="empty-state" id="empty-state">
                    <div class="empty-mark">
                        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
                    </div>
                    <div class="empty-title">Start a conversation</div>
                    <div class="empty-sub">Ask me anything</div>
                </div>`
        }

        function addMessage(role, text) {
            const empty = document.getElementById('empty-state')
            if (empty) empty.remove()

            const row = document.createElement('div')
            row.className = `msg-row ${role === 'user' ? 'user' : ''}`

            const avatar = document.createElement('div')
            avatar.className = `msg-avatar ${role === 'user' ? 'user-av' : 'ai'}`
            avatar.textContent = role === 'user' ? 'U' : 'AI'

            const bubble = document.createElement('div')
            bubble.className = `msg-bubble ${role === 'user' ? 'user' : 'ai'}`
            bubble.textContent = text

            if (role === 'user') { row.appendChild(bubble); row.appendChild(avatar) }
            else { row.appendChild(avatar); row.appendChild(bubble) }

            document.getElementById('messages').appendChild(row)
            document.getElementById('messages').scrollTop = 99999
            return bubble
        }

        function addTypingIndicator() {
            const empty = document.getElementById('empty-state')
            if (empty) empty.remove()
            const row = document.createElement('div')
            row.className = 'msg-row'
            row.id = 'typing-row'
            const avatar = document.createElement('div')
            avatar.className = 'msg-avatar ai'
            avatar.textContent = 'AI'
            const indicator = document.createElement('div')
            indicator.className = 'typing-indicator'
            indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>'
            row.appendChild(avatar)
            row.appendChild(indicator)
            document.getElementById('messages').appendChild(row)
            document.getElementById('messages').scrollTop = 99999
        }

        // ── SEND MESSAGE ──
        async function sendMessage() {
            if (!conversationId) {
                await createNewConversation()
            }

            const token = localStorage.getItem('token')
            const input = document.getElementById('user-input')
            const userInput = input.value.trim()
            if (!userInput) return

            input.value = ''
            addMessage('user', userInput)
            addTypingIndicator()

            const response = await fetch(`${API}/chat/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ conversation_id: conversationId, message: userInput })
            })

            const typingRow = document.getElementById('typing-row')
            if (typingRow) typingRow.remove()

            const reader = response.body.getReader()
            const decoder = new TextDecoder()
            const aiBubble = addMessage('ai', '')
            let fullText = ''

            while (true) {
                const { value, done } = await reader.read()
                if (done) break
                const text = decoder.decode(value)
                const lines = text.split('\n\n')
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const content = line.replace('data: ', '').trim()
                        if (content === '[DONE]') break
                        fullText += content
                        aiBubble.textContent = fullText
                        document.getElementById('messages').scrollTop = 99999
                    }
                }
            }

            // Update conversation title if it's the first message
            const conv = allConversations.find(c => c.id === conversationId)
            if (conv && conv.title === 'New Conversation') {
                conv.title = userInput.slice(0, 30) + (userInput.length > 30 ? '…' : '')
                renderConversationsList()
            }
        }
    </script>
</body>
</html>
